name: Release

# Cut a release by pushing a version tag:
#   npm version patch   # (or minor / major) -> bumps package.json, commits, tags
#   git push --follow-tags
# Builds the lib, publishes to npm via Trusted Publishing (OIDC - NO token),
# and creates a GitHub Release. Consumers then `npm install the-wild-man@<v>`.
#
# One-time setup on npmjs.com: package the-wild-man -> Settings ->
# Trusted Publisher -> add  org/user: stevenlawton, repo: TheWildMan,
# workflow: release.yml,  allowed action: npm publish.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write # create the GitHub Release
  id-token: write # OIDC for npm Trusted Publishing (provenance is automatic)

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Use npm >= 11.5.1 (required for trusted publishing)
        run: npm install -g npm@latest

      - name: Install
        run: npm ci

      - name: Build library
        run: npm run build:lib

      - name: Publish to npm (Trusted Publishing / OIDC - no token)
        run: npm publish

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
